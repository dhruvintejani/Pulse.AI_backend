[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q --strict-markers --disable-warnings"
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py313"
line-length = 120
src = ["app", "tests"]
exclude = ["venv", ".venv", "logs", ".pytest_cache", ".ruff_cache"]

[tool.ruff.lint]
select = ["F"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
