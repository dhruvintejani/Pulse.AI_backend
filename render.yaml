services:
  - type: web
    name: pulse-ai-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: APP_NAME
        value: Pulse AI API
      - key: APP_VERSION
        value: 1.0.0
      - key: API_V1_PREFIX
        value: /api/v1
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: pulse_ai
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: SECURITY_ALLOWED_HOSTS
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: INTERNAL_JWT_SECRET
        sync: false
